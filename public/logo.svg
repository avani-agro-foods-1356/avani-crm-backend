<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Infinity Hands Loop (Abstract representation) -->
  <path d="M 200,80 C 260,10 360,10 360,70 C 360,130 260,130 200,80 C 140,10 40,10 40,70 C 40,130 140,130 200,80 Z" fill="none" stroke="url(#greenGrad)" stroke-width="16" stroke-linecap="round" />
  <circle cx="200" cy="80" r="14" fill="#059669" />

  <!-- Text -->
  <text x="200" y="150" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#ef4444" text-anchor="middle" letter-spacing="4" filter="url(#shadow)">
    AVANI LOAN
  </text>
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#f87171" text-anchor="middle" letter-spacing="8">
    SERVICE
  </text>
</svg>
